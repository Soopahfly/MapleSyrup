<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="1100" height="780" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">MapleSyrup — Full Wiring (Maple + SD Card + OLED + Buzzer)</text>
  <text x="550" y="55" text-anchor="middle" fill="#888" font-size="12">Pico 2 W + Dreamcast port + microSD + SSD1306 OLED + passive buzzer</text>

  <!-- ===================== PICO 2 W ===================== -->
  <g id="pico">
    <rect x="370" y="80" width="160" height="480" rx="8" fill="#2d5a1b" stroke="#4a9c2a" stroke-width="2"/>
    <text x="450" y="105" text-anchor="middle" fill="#a0e060" font-size="13" font-weight="bold">Pico 2 W</text>
    <text x="450" y="120" text-anchor="middle" fill="#6ab04a" font-size="10">(RP2350)</text>

    <!-- USB -->
    <rect x="425" y="78" width="50" height="12" rx="3" fill="#888" stroke="#aaa" stroke-width="1"/>
    <text x="450" y="88" text-anchor="middle" fill="#333" font-size="8">USB</text>

    <!-- Left pins -->
    <g font-size="9">
      <rect x="350" y="133" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="141" text-anchor="end" fill="#888">GP0</text>
      <rect x="350" y="153" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="161" text-anchor="end" fill="#888">GP1</text>
      <rect x="350" y="173" width="22" height="10" rx="2" fill="#444"/><text x="348" y="181" text-anchor="end" fill="#aaa">GND</text>
      <rect x="350" y="193" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="201" text-anchor="end" fill="#888">GP2</text>
      <!-- GP3 BUZZER -->
      <rect x="350" y="213" width="22" height="10" rx="2" fill="#8b6914"/><text x="348" y="221" text-anchor="end" fill="#e0a030" font-weight="bold">GP3</text>
      <!-- GP4 SDA -->
      <rect x="350" y="233" width="22" height="10" rx="2" fill="#6b2fa0"/><text x="348" y="241" text-anchor="end" fill="#c080ff" font-weight="bold">GP4</text>
      <!-- GP5 SCL -->
      <rect x="350" y="253" width="22" height="10" rx="2" fill="#6b2fa0"/><text x="348" y="261" text-anchor="end" fill="#c080ff" font-weight="bold">GP5</text>
      <rect x="350" y="273" width="22" height="10" rx="2" fill="#444"/><text x="348" y="281" text-anchor="end" fill="#aaa">GND</text>
      <rect x="350" y="293" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="301" text-anchor="end" fill="#888">GP6</text>
      <rect x="350" y="313" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="321" text-anchor="end" fill="#888">GP7</text>
      <rect x="350" y="333" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="341" text-anchor="end" fill="#888">GP8</text>
      <rect x="350" y="353" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="361" text-anchor="end" fill="#888">GP9</text>
      <rect x="350" y="373" width="22" height="10" rx="2" fill="#444"/><text x="348" y="381" text-anchor="end" fill="#aaa">GND</text>
      <!-- GP10 SCK -->
      <rect x="350" y="393" width="22" height="10" rx="2" fill="#1a5c8a"/><text x="348" y="401" text-anchor="end" fill="#60b8f0" font-weight="bold">GP10</text>
      <!-- GP11 MOSI -->
      <rect x="350" y="413" width="22" height="10" rx="2" fill="#1a5c8a"/><text x="348" y="421" text-anchor="end" fill="#60b8f0" font-weight="bold">GP11</text>
      <!-- GP12 MISO -->
      <rect x="350" y="433" width="22" height="10" rx="2" fill="#1a5c8a"/><text x="348" y="441" text-anchor="end" fill="#60b8f0" font-weight="bold">GP12</text>
      <!-- GP13 CS -->
      <rect x="350" y="453" width="22" height="10" rx="2" fill="#1a5c8a"/><text x="348" y="461" text-anchor="end" fill="#60b8f0" font-weight="bold">GP13</text>
      <rect x="350" y="473" width="22" height="10" rx="2" fill="#444"/><text x="348" y="481" text-anchor="end" fill="#aaa">GND</text>
      <rect x="350" y="493" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="501" text-anchor="end" fill="#888">GP14</text>
      <rect x="350" y="513" width="22" height="10" rx="2" fill="#c8a020"/><text x="348" y="521" text-anchor="end" fill="#888">GP15</text>
      <rect x="350" y="533" width="22" height="10" rx="2" fill="#444"/><text x="348" y="541" text-anchor="end" fill="#aaa">GND</text>
    </g>

    <!-- Right pins -->
    <g font-size="9">
      <!-- VSYS -->
      <rect x="528" y="133" width="22" height="10" rx="2" fill="#c04040"/><text x="552" y="141" fill="#e06060">VSYS</text>
      <rect x="528" y="153" width="22" height="10" rx="2" fill="#444"/><text x="552" y="161" fill="#aaa">GND</text>
      <!-- 3V3 for OLED -->
      <rect x="528" y="173" width="22" height="10" rx="2" fill="#8b4513"/><text x="552" y="181" fill="#cd853f" font-weight="bold">3V3</text>
      <rect x="528" y="193" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="201" fill="#888">GP28</text>
      <rect x="528" y="213" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="221" fill="#888">GP27</text>
      <rect x="528" y="233" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="241" fill="#888">GP26</text>
      <rect x="528" y="253" width="22" height="10" rx="2" fill="#444"/><text x="552" y="261" fill="#aaa">GND</text>
      <rect x="528" y="273" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="281" fill="#888">GP22</text>
      <rect x="528" y="293" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="301" fill="#888">GP21</text>
      <rect x="528" y="313" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="321" fill="#888">GP20</text>
      <rect x="528" y="333" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="341" fill="#888">GP19</text>
      <rect x="528" y="353" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="361" fill="#888">GP18</text>
      <rect x="528" y="373" width="22" height="10" rx="2" fill="#444"/><text x="552" y="381" fill="#aaa">GND</text>
      <!-- GP17 SDCKB -->
      <rect x="528" y="393" width="22" height="10" rx="2" fill="#1a6030"/><text x="552" y="401" fill="#40e080" font-weight="bold">GP17</text>
      <!-- GP16 SDCKA -->
      <rect x="528" y="413" width="22" height="10" rx="2" fill="#1a6030"/><text x="552" y="421" fill="#40e080" font-weight="bold">GP16</text>
      <rect x="528" y="433" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="441" fill="#888">GP15</text>
      <rect x="528" y="453" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="461" fill="#888">GP14</text>
      <rect x="528" y="473" width="22" height="10" rx="2" fill="#444"/><text x="552" y="481" fill="#aaa">GND</text>
      <rect x="528" y="493" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="501" fill="#888">GP13</text>
      <rect x="528" y="513" width="22" height="10" rx="2" fill="#c8a020"/><text x="552" y="521" fill="#888">GP12</text>
      <rect x="528" y="533" width="22" height="10" rx="2" fill="#444"/><text x="552" y="541" fill="#aaa">GND</text>
    </g>

    <!-- Chip -->
    <rect x="405" y="240" width="90" height="60" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <text x="450" y="267" text-anchor="middle" fill="#666" font-size="9">RP2350</text>
    <text x="450" y="282" text-anchor="middle" fill="#666" font-size="9">CYW43439</text>
    <text x="450" y="590" text-anchor="middle" fill="#6ab04a" font-size="9">▲ BT Antenna</text>
  </g>

  <!-- ===================== DREAMCAST CONNECTOR ===================== -->
  <g id="dreamcast">
    <rect x="20" y="110" width="175" height="175" rx="8" fill="#1e1e3a" stroke="#3060c0" stroke-width="2"/>
    <text x="108" y="133" text-anchor="middle" fill="#8080e0" font-size="12" font-weight="bold">Dreamcast Port</text>
    <text x="108" y="149" text-anchor="middle" fill="#555590" font-size="10">(extension cable)</text>
    <circle cx="80"  cy="200" r="7" fill="#c04040" stroke="#e06060" stroke-width="1.5"/>
    <text x="80" y="204" text-anchor="middle" fill="#fff" font-size="8">1</text>
    <circle cx="100" cy="190" r="7" fill="#40a040" stroke="#80c080" stroke-width="1.5"/>
    <text x="100" y="194" text-anchor="middle" fill="#fff" font-size="8">2</text>
    <circle cx="108" cy="213" r="7" fill="#444" stroke="#888" stroke-width="1.5"/>
    <text x="108" y="217" text-anchor="middle" fill="#fff" font-size="8">3</text>
    <circle cx="127" cy="200" r="7" fill="#2060a0" stroke="#60a0e0" stroke-width="1.5"/>
    <text x="127" y="204" text-anchor="middle" fill="#fff" font-size="8">4</text>
    <circle cx="140" cy="190" r="7" fill="#555" stroke="#999" stroke-width="1.5"/>
    <text x="140" y="194" text-anchor="middle" fill="#fff" font-size="8">5</text>

    <text x="30" y="245" fill="#e06060" font-size="10">● 1: +5V → VSYS</text>
    <text x="30" y="260" fill="#80c080" font-size="10">● 2: SDCKA → GP16</text>
    <text x="30" y="275" fill="#aaa"    font-size="10">● 3: GND → GND</text>
  </g>
  <text x="30" y="296" fill="#60a0e0" font-size="10">  ● 4: SDCKB → GP17</text>
  <text x="30" y="311" fill="#999"    font-size="10">  ● 5: Sense (leave)</text>

  <!-- ===================== SD CARD MODULE ===================== -->
  <g id="sdcard">
    <rect x="20" y="340" width="175" height="155" rx="8" fill="#1a2a1a" stroke="#1a5c8a" stroke-width="2"/>
    <text x="108" y="363" text-anchor="middle" fill="#60b8f0" font-size="12" font-weight="bold">microSD Module</text>
    <text x="108" y="378" text-anchor="middle" fill="#3a7a9a" font-size="10">SPI (SPI1)</text>

    <text x="35" y="403" fill="#60b8f0" font-size="11">VCC  → 3V3</text>
    <text x="35" y="421" fill="#60b8f0" font-size="11">GND  → GND</text>
    <text x="35" y="439" fill="#60b8f0" font-size="11">SCK  → GP10</text>
    <text x="35" y="457" fill="#60b8f0" font-size="11">MOSI → GP11</text>
    <text x="35" y="475" fill="#60b8f0" font-size="11">MISO → GP12</text>
    <text x="35" y="493" fill="#60b8f0" font-size="11">CS   → GP13</text>
  </g>

  <!-- ===================== OLED ===================== -->
  <g id="oled">
    <rect x="750" y="110" width="200" height="155" rx="8" fill="#1a1a2a" stroke="#6b2fa0" stroke-width="2"/>
    <text x="850" y="133" text-anchor="middle" fill="#c080ff" font-size="12" font-weight="bold">SSD1306 OLED</text>
    <text x="850" y="149" text-anchor="middle" fill="#6b2fa0" font-size="10">0.96" I2C (addr 0x3C)</text>
    <!-- Screen -->
    <rect x="780" y="158" width="140" height="60" rx="4" fill="#111" stroke="#444"/>
    <text x="850" y="183" text-anchor="middle" fill="#4040ff" font-size="9">VMU LCD 48x32</text>
    <text x="850" y="198" text-anchor="middle" fill="#333" font-size="8">48×32 1-bit display</text>

    <text x="765" y="240" fill="#c080ff" font-size="11">VCC → 3V3</text>
    <text x="765" y="257" fill="#c080ff" font-size="11">GND → GND</text>
    <text x="765" y="274" fill="#c080ff" font-size="11">SDA → GP4</text>
  </g>
  <text x="765" y="285" fill="#c080ff" font-size="11">  SCL → GP5</text>

  <!-- ===================== BUZZER ===================== -->
  <g id="buzzer">
    <rect x="750" y="340" width="200" height="120" rx="8" fill="#1a1a10" stroke="#8b6914" stroke-width="2"/>
    <text x="850" y="363" text-anchor="middle" fill="#e0a030" font-size="12" font-weight="bold">Passive Buzzer</text>
    <text x="850" y="379" text-anchor="middle" fill="#6b5010" font-size="10">VMU audio (PWM)</text>
    <!-- Buzzer symbol -->
    <circle cx="850" cy="415" r="20" fill="#111" stroke="#8b6914" stroke-width="2"/>
    <text x="850" y="419" text-anchor="middle" fill="#e0a030" font-size="14">♪</text>

    <text x="765" y="445" fill="#e0a030" font-size="11">+ → GP3</text>
    <text x="765" y="463" fill="#e0a030" font-size="11">- → GND</text>
  </g>

  <!-- ===================== WIRES — Dreamcast to Pico ===================== -->
  <!-- +5V DC→VSYS -->
  <polyline points="195,200 230,200 230,138 350,138" fill="none" stroke="#e06060" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- SDCKA DC→GP16 -->
  <polyline points="195,193 240,193 240,418 350,418" fill="none" stroke="#80c080" stroke-width="2"/>
  <!-- GND DC→GND (left GND row y=173) -->
  <polyline points="195,213 233,213 233,178 350,178" fill="none" stroke="#888" stroke-width="1.5"/>
  <!-- SDCKB DC→GP17 -->
  <polyline points="195,200 248,200 248,398 350,398" fill="none" stroke="#60a0e0" stroke-width="2"/>

  <!-- ===================== WIRES — SD Card to Pico ===================== -->
  <!-- 3V3 SD→3V3 (right y=178) -->
  <polyline points="195,400 210,400 210,178 528,178" fill="none" stroke="#cd853f" stroke-width="2"/>
  <!-- GND SD→GND (left y=373) -->
  <polyline points="195,415 215,415 215,378 350,378" fill="none" stroke="#888" stroke-width="1.5"/>
  <!-- SCK SD→GP10 (left y=398) -->
  <polyline points="195,430 220,430 220,398 350,398" fill="none" stroke="#60b8f0" stroke-width="2"/>
  <!-- MOSI SD→GP11 (left y=418) -->
  <polyline points="195,448 225,448 225,418 350,418" fill="none" stroke="#60b8f0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- MISO SD→GP12 (left y=438) -->
  <polyline points="195,466 228,466 228,438 350,438" fill="none" stroke="#60b8f0" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- CS SD→GP13 (left y=458) -->
  <polyline points="195,484 231,484 231,458 350,458" fill="none" stroke="#60b8f0" stroke-width="1.5"/>

  <!-- ===================== WIRES — OLED to Pico ===================== -->
  <!-- VCC OLED→3V3 -->
  <polyline points="750,240 720,240 720,178 528,178" fill="none" stroke="#cd853f" stroke-width="2"/>
  <!-- GND OLED→GND (right y=258) -->
  <polyline points="750,257 710,257 710,258 528,258" fill="none" stroke="#888" stroke-width="1.5"/>
  <!-- SDA OLED→GP4 (left y=238) -->
  <polyline points="750,274 700,274 700,238 350,238" fill="none" stroke="#c080ff" stroke-width="2"/>
  <!-- SCL OLED→GP5 (left y=258) -->
  <polyline points="750,285 695,285 695,258 350,258" fill="none" stroke="#c080ff" stroke-width="1.5"/>

  <!-- ===================== WIRES — Buzzer to Pico ===================== -->
  <!-- + Buzzer→GP3 (left y=218) -->
  <polyline points="750,445 690,445 690,218 350,218" fill="none" stroke="#e0a030" stroke-width="2"/>
  <!-- - Buzzer→GND (left y=278) -->
  <polyline points="750,463 685,463 685,278 350,278" fill="none" stroke="#888" stroke-width="1.5"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="200" y="580" width="700" height="90" rx="8" fill="#0d0d1f" stroke="#333" stroke-width="1"/>
  <text x="550" y="603" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Pin Summary</text>

  <text x="220" y="622" fill="#40e080" font-size="10" font-weight="bold">Maple Bus</text>
  <text x="220" y="638" fill="#aaa" font-size="10">GP16=SDCKA  GP17=SDCKB</text>

  <text x="380" y="622" fill="#60b8f0" font-size="10" font-weight="bold">microSD (SPI1)</text>
  <text x="380" y="638" fill="#aaa" font-size="10">GP10=SCK  GP11=MOSI</text>
  <text x="380" y="653" fill="#aaa" font-size="10">GP12=MISO  GP13=CS</text>

  <text x="560" y="622" fill="#c080ff" font-size="10" font-weight="bold">OLED (I2C0)</text>
  <text x="560" y="638" fill="#aaa" font-size="10">GP4=SDA  GP5=SCL</text>

  <text x="700" y="622" fill="#e0a030" font-size="10" font-weight="bold">Buzzer (PWM)</text>
  <text x="700" y="638" fill="#aaa" font-size="10">GP3=PWM out</text>

  <text x="860" y="622" fill="#e06060" font-size="10" font-weight="bold">Power</text>
  <text x="860" y="638" fill="#aaa" font-size="10">VSYS=5V  3V3=3.3V</text>

  <!-- ===================== USB HOST NOTE ===================== -->
  <!-- USB host mode: micro-USB port on the Pico 2 W is used in host mode.
       Connect a USB OTG adapter (micro-USB male to USB-A female) then plug
       any USB HID gamepad directly.  GPIO 24 drives the VBUS boost converter
       to power the connected device. -->
  <rect x="20" y="500" width="330" height="130" rx="8" fill="#1a1020" stroke="#c040c0" stroke-width="2"/>
  <text x="185" y="523" text-anchor="middle" fill="#e080ff" font-size="12" font-weight="bold">USB Host Mode (Wired Controllers)</text>
  <text x="35" y="543" fill="#c080e0" font-size="10">Pico 2 W micro-USB port → host mode</text>
  <text x="35" y="560" fill="#c080e0" font-size="10">Adapter needed: micro-USB male → USB-A female</text>
  <text x="35" y="577" fill="#c080e0" font-size="10">Plug any USB HID gamepad (PS3/PS4/PS5/Xbox/8BitDo)</text>
  <text x="35" y="594" fill="#aaa"     font-size="10">GPIO 24 → VBUS enable (high = power on)</text>
  <text x="35" y="611" fill="#888"     font-size="10">Stdio: UART on GP0 (TX) / GP1 (RX) — USB no longer CDC</text>
  <text x="35" y="625" fill="#555"     font-size="9">Note: BT and USB controllers both use the same DC port</text>

  <!-- Footer -->
  <text x="550" y="765" text-anchor="middle" fill="#555" font-size="10">github.com/Soopahfly/MapleSyrup</text>
</svg>
